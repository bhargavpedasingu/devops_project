name: Flask App CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  build-push-docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devopsapp:latest
            ${{ secrets.DOCKER_USERNAME }}/devopsapp:${{ github.sha }}

  deploy:
    needs: build-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          echo "${{ secrets.AZURE_SSH_KEY }}" > devopskey.pem
          chmod 600 devopskey.pem

      - name: Update docker-compose image using sed
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/devopsapp:${{ github.sha }}|g" docker-compose.yml

      - name: Copy compose file to Azure VM
        run: |
          scp -o StrictHostKeyChecking=no \
            -i devopskey.pem \
            docker-compose.yml \
            azureuser@20.215.35.77:/home/azureuser/

      - name: Deploy to Azure VM
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i devopskey.pem \
            azureuser@20.215.35.77 << EOF

          sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

          cd /home/azureuser

          sudo docker compose pull
          sudo docker compose down
          sudo docker compose up -d

          EOF