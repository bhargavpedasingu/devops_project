name: Flask App CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  build-push-docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devopsapp:latest
            ${{ secrets.DOCKER_USERNAME }}/devopsapp:${{ github.sha }}

  deploy:
    needs: build-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          cat > devopskey.pem << 'EOF'
          ${{ secrets.AZURE_SSH_KEY }}
          EOF
          chmod 600 devopskey.pem

      - name: Prepare environment variables in docker-compose
        run: |
          export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          export TAG_APP1="${{ github.sha }}"
          export TAG_APP2="latest" 
          
          sed -i "s|\${DOCKER_USERNAME}|$DOCKER_USERNAME|g" docker-compose.yml
          sed -i "s|\${TAG_APP1}|$TAG_APP1|g" docker-compose.yml
          sed -i "s|\${TAG_APP2}|$TAG_APP2|g" docker-compose.yml

      - name: Copy compose file to Azure VM
        run: |
          scp -o StrictHostKeyChecking=no \
            -i devopskey.pem \
            docker-compose.yml \
            azureuser@20.215.35.77:/home/azureuser/

      - name: Deploy to Azure VM
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i devopskey.pem \
            azureuser@20.215.35.77 << 'EOF'

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

          cd /home/azureuser

          # Deploy both application instances cleanly without sudo roadblocks
          docker compose pull
          docker compose down || true
          docker compose up -d --force-recreate
          
          EOF
