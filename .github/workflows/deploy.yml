name: Flask App CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  build-push-docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devopsapp:latest
            ${{ secrets.DOCKER_USERNAME }}/devopsapp:${{ github.sha }}

  deploy:
    needs: build-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          cat > devopskey.pem << 'EOF'
          ${{ secrets.AZURE_SSH_KEY }}
          EOF
          chmod 600 devopskey.pem

      - name: Update docker-compose image using sed
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/devopsapp:${{ github.sha }}|g" docker-compose.yml

      - name: Copy compose file to Azure VM
        run: |
          scp -o StrictHostKeyChecking=no \
            -i devopskey.pem \
            docker-compose.yml \
            azureuser@20.215.35.77:/home/azureuser/

      - name: Deploy to Azure VM
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i devopskey.pem \
            azureuser@20.215.35.77 << 'EOF'

          echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

          cd /home/azureuser

          # 1. Add official Docker setup to download the missing compose plugin
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # 2. Add the repository to Apt sources:
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          
          # 3. Update and install the plugin cleanly
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

          # 4. Deploy your application containers
          sudo docker compose pull
          sudo docker compose down || true
          sudo docker compose up -d
          
          EOF