version: '3.8'

services:
  flask-app-1:
    image: ${DOCKER_USERNAME}/devopsapp:${TAG_APP1}
    restart: always
    ports:
      - "8001:8000"
    environment:
      INSTANCE: flask-app-1
      VERSION: "500.0"

  flask-app-2:
    image: ${DOCKER_USERNAME}/devopsapp:${TAG_APP2}
    restart: always
    ports:
      - "8002:8000"
    environment:
      INSTANCE: flask-app-2
      VERSION: "1.0"